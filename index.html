<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a0a2e">
<title>Parfum · Cobros</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0820;
  --bg2: #1a1035;
  --card: #201545;
  --card2: #2a1d58;
  --accent: #c084fc;
  --accent2: #e879f9;
  --gold: #fbbf24;
  --green: #34d399;
  --red: #f87171;
  --blue: #60a5fa;
  --text: #f0e8ff;
  --text2: #a78bca;
  --text3: #6b5a8a;
  --border: rgba(192,132,252,0.15);
  --radius: 20px;
  --radius-sm: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
}

/* ── App Shell ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ── Background glow ── */
.app::before {
  content: '';
  position: fixed;
  top: -100px; left: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(192,132,252,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.app::after {
  content: '';
  position: fixed;
  bottom: -50px; right: -50px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(232,121,249,0.1) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
.header {
  position: relative;
  z-index: 10;
  padding: 52px 20px 16px;
  background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sync-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 11px;
  color: var(--text2);
}

.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}

/* ── Stats row ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}

.stat-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}

.stat-value {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 700;
}

.stat-value.danger { color: var(--red); }
.stat-value.success { color: var(--green); }
.stat-value.neutral { color: var(--accent); }

/* ── Scrollable content ── */
.content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 0 16px 120px;
  position: relative;
  z-index: 5;
}

.content::-webkit-scrollbar { display: none; }

/* ── Section label ── */
.section-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  margin: 20px 0 10px;
  padding-left: 4px;
}

/* ── Filter chips ── */
.filter-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 12px;
  -webkit-overflow-scrolling: touch;
}

.filter-scroll::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  font-weight: 600;
}

/* ── Search ── */
.search-wrap {
  position: relative;
  margin-bottom: 16px;
}

.search-wrap input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px 12px 40px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:focus { border-color: var(--accent); }

.search-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 16px;
  pointer-events: none;
}

/* ── Debt cards ── */
.debt-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
}

.debt-card:active { transform: scale(0.98); }

.debt-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
}

.debt-card.pendiente::before { background: var(--gold); }
.debt-card.vencido::before { background: var(--red); }
.debt-card.abonado::before { background: var(--blue); }
.debt-card.pagado::before { background: var(--green); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.client-name {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.perfume-tag {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}

.badge-pendiente { background: rgba(251,191,36,0.15); color: var(--gold); }
.badge-vencido { background: rgba(248,113,113,0.15); color: var(--red); }
.badge-abonado { background: rgba(96,165,250,0.15); color: var(--blue); }
.badge-pagado { background: rgba(52,211,153,0.15); color: var(--green); }

.card-amounts {
  display: flex;
  gap: 12px;
  margin-bottom: 12px;
}

.amount-block { flex: 1; }

.amount-label {
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 2px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.amount-value {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}

.amount-value.red { color: var(--red); }
.amount-value.green { color: var(--green); }

/* Progress bar */
.progress-wrap {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  margin-bottom: 12px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s ease;
}

.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.dates-info {
  font-size: 11px;
  color: var(--text3);
}

.vence-tag {
  font-size: 11px;
  color: var(--red);
  font-weight: 500;
}

.vence-tag.ok { color: var(--green); }

.card-actions {
  display: flex;
  gap: 8px;
}

.btn-sm {
  padding: 7px 14px;
  border-radius: 10px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-abonar {
  background: rgba(192,132,252,0.2);
  color: var(--accent);
  border: 1px solid rgba(192,132,252,0.3);
}

.btn-abonar:active { background: rgba(192,132,252,0.35); }

.btn-borrar {
  background: rgba(248,113,113,0.12);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.2);
}

.btn-borrar:active { background: rgba(248,113,113,0.25); }

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}

.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-text { font-size: 15px; font-family: 'Syne', sans-serif; }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(15,8,32,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 10px 0 24px;
  z-index: 50;
}

.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text3);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  cursor: pointer;
  padding: 4px 20px;
  border-radius: 12px;
  transition: color 0.2s;
}

.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

.nav-btn-add {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 18px;
  width: 54px; height: 54px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(192,132,252,0.4);
  margin-top: -20px;
  transition: transform 0.15s, box-shadow 0.15s;
}

.nav-btn-add:active {
  transform: scale(0.93);
  box-shadow: 0 2px 10px rgba(192,132,252,0.3);
}

.nav-btn-add svg { width: 26px; height: 26px; color: white; }

/* ── Sheet (bottom drawer) ── */
.sheet-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  align-items: flex-end;
  justify-content: center;
}

.sheet-overlay.open { display: flex; }

.sheet {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 28px 28px 0 0;
  width: 100%;
  max-width: 430px;
  max-height: 92dvh;
  overflow-y: auto;
  padding: 12px 20px 40px;
  animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}

.sheet::-webkit-scrollbar { display: none; }

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.sheet-handle {
  width: 40px; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  margin: 0 auto 20px;
}

.sheet-title {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  color: var(--text);
}

/* ── Form fields ── */
.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.field input, .field select, .field textarea {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}

.field input:focus, .field select:focus {
  border-color: var(--accent);
}

.field input::placeholder { color: var(--text3); }

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: var(--radius-sm);
  padding: 16px;
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.02em;
}

.btn-primary:active { opacity: 0.85; transform: scale(0.98); }

.btn-secondary {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}

.btn-secondary:active { background: rgba(255,255,255,0.05); }

/* ── Abonos history ── */
.abonos-title {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 16px 0 8px;
}

.abono-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.abono-row:last-child { border-bottom: none; }
.abono-fecha { color: var(--text2); }
.abono-monto { color: var(--green); font-weight: 600; font-family: 'Syne', sans-serif; }

/* ── CSV button ── */
.csv-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s;
}

.csv-btn:active { background: var(--card2); }

/* ── Pulse animation ── */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">🌸 Parfum</div>
      <div class="sync-pill">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-txt">Cargando...</span>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Pendiente</div>
        <div class="stat-value danger" id="totalPendiente">$0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cobrado</div>
        <div class="stat-value success" id="totalCobrado">$0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Clientes</div>
        <div class="stat-value neutral" id="totalClientes">0</div>
      </div>
    </div>
  </div>

  <!-- Scrollable list -->
  <div class="content">
    <div class="section-label">Registro de deudas</div>

    <!-- Filters -->
    <div class="filter-scroll">
      <button class="chip active" onclick="setFiltro('todos', this)">Todos</button>
      <button class="chip" onclick="setFiltro('pendiente', this)">Pendientes</button>
      <button class="chip" onclick="setFiltro('vencido', this)">Vencidos</button>
      <button class="chip" onclick="setFiltro('abonado', this)">Abonados</button>
      <button class="chip" onclick="setFiltro('pagado', this)">Pagados</button>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Buscar cliente o perfume..." oninput="renderLista()" id="search-input">
    </div>

    <!-- List -->
    <div id="lista-deudas"></div>
    <div class="empty" id="empty-state" style="display:none;">
      <div class="empty-icon">🌸</div>
      <div class="empty-text">Sin registros aún</div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="mostrarVista('lista')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Inicio
    </button>
    <button class="nav-btn-add" onclick="abrirFormulario()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="nav-btn" onclick="exportarCSV()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar
    </button>
  </div>

</div>

<!-- Sheet: Nueva deuda -->
<div class="sheet-overlay" id="sheet-nueva" onclick="cerrarSheet('sheet-nueva', event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Nueva deuda</div>

    <div class="field">
      <label>Cliente *</label>
      <input type="text" id="inp-cliente" placeholder="Nombre completo">
    </div>
    <div class="field">
      <label>Perfume / Producto</label>
      <input type="text" id="inp-perfume" placeholder="Ej: Club de Nuit 100ml">
    </div>
    <div class="field">
      <label>Monto total *</label>
      <input type="number" id="inp-monto" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Fecha venta</label>
        <input type="date" id="inp-fecha">
      </div>
      <div class="field">
        <label>Fecha de pago</label>
        <input type="date" id="inp-vence">
      </div>
    </div>
    <div class="field">
      <label>Teléfono</label>
      <input type="tel" id="inp-tel" placeholder="Opcional" inputmode="tel">
    </div>
    <div class="field">
      <label>Notas</label>
      <input type="text" id="inp-notas" placeholder="Ej: Dejó anticipo de $100">
    </div>

    <button class="btn-primary" onclick="agregarDeuda()">Registrar deuda</button>
    <button class="btn-secondary" onclick="cerrarSheet('sheet-nueva')">Cancelar</button>
  </div>
</div>

<!-- Sheet: Abono -->
<div class="sheet-overlay" id="sheet-abono" onclick="cerrarSheet('sheet-abono', event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="modal-nombre">Abono</div>
    <div style="font-size:13px; color:var(--text2); margin-bottom:16px;" id="modal-perfume-info"></div>

    <div class="field">
      <label>Monto del abono *</label>
      <input type="number" id="modal-monto" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Fecha</label>
        <input type="date" id="modal-fecha">
      </div>
      <div class="field">
        <label>Nota</label>
        <input type="text" id="modal-nota" placeholder="Efectivo...">
      </div>
    </div>

    <div id="abonos-list"></div>

    <button class="btn-primary" onclick="registrarAbono()">Registrar abono</button>
    <button class="btn-secondary" onclick="cerrarSheet('sheet-abono')">Cancelar</button>
  </div>
</div>

<script>
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzaLqQf44ncZHDcuyJzET9sIxMcMSx6KWYib_Dh8inF3nOz05a6_Wm7WPx6ToLNlQI/exec';

  let deudas = JSON.parse(localStorage.getItem('parfum-deudas') || '[]');
  let filtroActual = 'todos';
  let modalId = null;
  let syncTimeout = null;
  const today = new Date().toISOString().split('T')[0];

  // ── Sync status ────────────────────────────────────────────────────────
  function setSyncStatus(estado) {
    const dot = document.getElementById('sync-dot');
    const txt = document.getElementById('sync-txt');
    const states = {
      syncing: { bg: '#fbbf24', label: 'Guardando...', anim: 'pulse 1s infinite' },
      ok:      { bg: '#34d399', label: 'Sincronizado ✓', anim: 'none' },
      error:   { bg: '#f87171', label: 'Sin conexión', anim: 'none' },
      loading: { bg: '#fbbf24', label: 'Cargando...', anim: 'pulse 1s infinite' },
    };
    const s = states[estado] || states.loading;
    dot.style.background = s.bg;
    dot.style.animation = s.anim;
    txt.textContent = s.label;
  }

  // ── Storage ────────────────────────────────────────────────────────────
  function guardar() {
    localStorage.setItem('parfum-deudas', JSON.stringify(deudas));
    clearTimeout(syncTimeout);
    setSyncStatus('syncing');
    syncTimeout = setTimeout(guardarEnSheets, 800);
  }

  function jsonpRequest(params, onSuccess, onError) {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const tid = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById('_jp_' + cbName);
      if (s) s.remove();
      if (onError) onError('timeout');
    }, 12000);

    window[cbName] = function(data) {
      clearTimeout(tid);
      delete window[cbName];
      const s = document.getElementById('_jp_' + cbName);
      if (s) s.remove();
      if (onSuccess) onSuccess(data);
    };

    const qs = Object.entries({ ...params, callback: cbName, t: Date.now() })
      .map(([k, v]) => k + '=' + encodeURIComponent(v)).join('&');

    const script = document.createElement('script');
    script.id = '_jp_' + cbName;
    script.src = SHEETS_URL + '?' + qs;
    script.onerror = () => { clearTimeout(tid); delete window[cbName]; if (onError) onError('error'); };
    document.head.appendChild(script);
  }

  function guardarEnSheets() {
    try {
      let iframe = document.getElementById('_sh_if');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = '_sh_if'; iframe.name = '_sh_if';
        iframe.style.cssText = 'display:none;position:absolute;';
        document.body.appendChild(iframe);
      }
      let form = document.getElementById('_sh_fm');
      if (form) form.remove();
      form = document.createElement('form');
      form.id = '_sh_fm'; form.method = 'POST';
      form.action = SHEETS_URL; form.target = '_sh_if';
      form.style.cssText = 'display:none;position:absolute;';

      const inp = document.createElement('input');
      inp.type = 'hidden'; inp.name = 'data'; inp.value = JSON.stringify(deudas);
      form.appendChild(inp);
      const act = document.createElement('input');
      act.type = 'hidden'; act.name = 'action'; act.value = 'save';
      form.appendChild(act);
      document.body.appendChild(form);
      iframe.onload = () => { setSyncStatus('ok'); form.remove(); };
      setTimeout(() => setSyncStatus('ok'), 3000);
      form.submit();
    } catch(err) { setSyncStatus('error'); }
  }

  function cargarDeSheets() {
    setSyncStatus('loading');
    jsonpRequest({ action: 'load' },
      (data) => {
        if (Array.isArray(data) && data.length > 0) {
          deudas = data.map(d => ({
            ...d,
            monto: parseFloat(d.monto) || 0,
            abonos: typeof d.abonos === 'string' ? JSON.parse(d.abonos || '[]') : (d.abonos || [])
          }));
          localStorage.setItem('parfum-deudas', JSON.stringify(deudas));
        }
        setSyncStatus('ok');
        renderLista(); renderStats();
      },
      () => { setSyncStatus('error'); renderLista(); renderStats(); }
    );
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function fmt(n) {
    const v = Number(n).toFixed(0);
    return '$' + v.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, dia] = d.split('-');
    return `${dia}/${m}/${y.slice(2)}`;
  }

  function getEstado(d) {
    const ab = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
    if (d.monto - ab <= 0) return 'pagado';
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const v = d.fechaVence ? new Date(d.fechaVence + 'T00:00:00') : null;
    if (v && v < hoy) return 'vencido';
    if (ab > 0) return 'abonado';
    return 'pendiente';
  }

  function diasRestantes(fv) {
    if (!fv) return null;
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    return Math.round((new Date(fv + 'T00:00:00') - hoy) / 86400000);
  }

  // ── Render ─────────────────────────────────────────────────────────────
  function renderStats() {
    let pend = 0, cob = 0, cls = new Set();
    deudas.forEach(d => {
      const ab = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
      pend += Math.max(0, d.monto - ab);
      cob += ab;
      cls.add(d.cliente);
    });
    document.getElementById('totalPendiente').textContent = fmt(pend);
    document.getElementById('totalCobrado').textContent = fmt(cob);
    document.getElementById('totalClientes').textContent = cls.size;
  }

  function renderLista() {
    const busq = (document.getElementById('search-input').value || '').toLowerCase();
    const lista = deudas.filter(d => {
      const estado = getEstado(d);
      const matchF = filtroActual === 'todos' || estado === filtroActual;
      const matchB = !busq || d.cliente.toLowerCase().includes(busq) || (d.perfume||'').toLowerCase().includes(busq);
      return matchF && matchB;
    });

    const container = document.getElementById('lista-deudas');
    const empty = document.getElementById('empty-state');

    if (lista.length === 0) {
      container.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const estadoLabel = { pendiente:'Pendiente', vencido:'Vencido', abonado:'Abonado', pagado:'Pagado' };

    container.innerHTML = lista.map(d => {
      const ab = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
      const resta = Math.max(0, d.monto - ab);
      const estado = getEstado(d);
      const pct = Math.min(100, Math.round((ab / d.monto) * 100));
      const dias = diasRestantes(d.fechaVence);

      let venceHtml = '';
      if (estado !== 'pagado' && d.fechaVence) {
        if (dias < 0) venceHtml = `<span class="vence-tag">Venció hace ${Math.abs(dias)}d</span>`;
        else if (dias === 0) venceHtml = `<span class="vence-tag">Vence hoy</span>`;
        else if (dias <= 7) venceHtml = `<span class="vence-tag">Vence en ${dias}d</span>`;
        else venceHtml = `<span class="vence-tag ok">Pago: ${fmtDate(d.fechaVence)}</span>`;
      }

      return `
      <div class="debt-card ${estado}" onclick="abrirAbono(${d.id})">
        <div class="card-top">
          <div>
            <div class="client-name">${d.cliente}</div>
            ${d.perfume ? `<div class="perfume-tag">🌸 ${d.perfume}</div>` : ''}
          </div>
          <span class="badge badge-${estado}">${estadoLabel[estado]}</span>
        </div>

        <div class="card-amounts">
          <div class="amount-block">
            <div class="amount-label">Total</div>
            <div class="amount-value">${fmt(d.monto)}</div>
          </div>
          <div class="amount-block">
            <div class="amount-label">Abonado</div>
            <div class="amount-value green">${ab > 0 ? fmt(ab) : '—'}</div>
          </div>
          <div class="amount-block">
            <div class="amount-label">Resta</div>
            <div class="amount-value ${estado === 'pagado' ? 'green' : 'red'}">${estado === 'pagado' ? '✓ Pagado' : fmt(resta)}</div>
          </div>
        </div>

        ${ab > 0 ? `<div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>` : ''}

        <div class="card-footer">
          <div>
            <div class="dates-info">Venta: ${fmtDate(d.fecha)}</div>
            ${venceHtml}
          </div>
          <div class="card-actions" onclick="event.stopPropagation()">
            ${estado !== 'pagado' ? `<button class="btn-sm btn-abonar" onclick="abrirAbono(${d.id})">+ Abonar</button>` : ''}
            <button class="btn-sm btn-borrar" onclick="eliminar(${d.id})">🗑</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Actions ────────────────────────────────────────────────────────────
  function setFiltro(f, btn) {
    filtroActual = f;
    document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLista();
  }

  function abrirFormulario() {
    document.getElementById('inp-fecha').value = today;
    document.getElementById('inp-cliente').value = '';
    document.getElementById('inp-perfume').value = '';
    document.getElementById('inp-monto').value = '';
    document.getElementById('inp-vence').value = '';
    document.getElementById('inp-tel').value = '';
    document.getElementById('inp-notas').value = '';
    document.getElementById('sheet-nueva').classList.add('open');
  }

  function agregarDeuda() {
    const cliente = document.getElementById('inp-cliente').value.trim();
    const monto = parseFloat(document.getElementById('inp-monto').value);
    if (!cliente || !monto || monto <= 0) {
      alert('Ingresa el cliente y el monto.');
      return;
    }
    deudas.unshift({
      id: Date.now(),
      cliente,
      perfume: document.getElementById('inp-perfume').value.trim(),
      monto,
      fecha: document.getElementById('inp-fecha').value,
      fechaVence: document.getElementById('inp-vence').value,
      tel: document.getElementById('inp-tel').value.trim(),
      notas: document.getElementById('inp-notas').value.trim(),
      abonos: []
    });
    guardar(); renderLista(); renderStats();
    cerrarSheet('sheet-nueva');
  }

  function eliminar(id) {
    if (!confirm('¿Eliminar este registro?')) return;
    deudas = deudas.filter(d => d.id !== id);
    guardar(); renderLista(); renderStats();
  }

  function abrirAbono(id) {
    modalId = id;
    const d = deudas.find(x => x.id === id);
    const ab = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
    const resta = d.monto - ab;
    document.getElementById('modal-nombre').textContent = d.cliente;
    document.getElementById('modal-perfume-info').textContent =
      (d.perfume ? `🌸 ${d.perfume} · ` : '') + `Resta: ${fmt(resta)}`;
    document.getElementById('modal-monto').value = '';
    document.getElementById('modal-nota').value = '';
    document.getElementById('modal-fecha').value = today;

    const lista = document.getElementById('abonos-list');
    if (d.abonos && d.abonos.length > 0) {
      lista.innerHTML = `<div class="abonos-title">Historial de abonos</div>` +
        d.abonos.map(a => `
          <div class="abono-row">
            <span class="abono-fecha">${fmtDate(a.fecha)}${a.nota ? ' · ' + a.nota : ''}</span>
            <span class="abono-monto">${fmt(a.monto)}</span>
          </div>`).join('');
    } else {
      lista.innerHTML = '';
    }
    document.getElementById('sheet-abono').classList.add('open');
  }

  function registrarAbono() {
    const monto = parseFloat(document.getElementById('modal-monto').value);
    if (!monto || monto <= 0) { alert('Ingresa un monto válido.'); return; }
    const d = deudas.find(x => x.id === modalId);
    const ab = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
    if (monto > d.monto - ab + 0.01) { alert('El monto supera la deuda.'); return; }
    d.abonos.push({
      monto,
      fecha: document.getElementById('modal-fecha').value,
      nota: document.getElementById('modal-nota').value.trim()
    });
    guardar(); cerrarSheet('sheet-abono'); renderLista(); renderStats();
  }

  function cerrarSheet(id, event) {
    if (event && event.target !== document.getElementById(id)) return;
    document.getElementById(id).classList.remove('open');
  }

  // ── CSV ────────────────────────────────────────────────────────────────
  function exportarCSV() {
    if (!deudas.length) { alert('No hay registros.'); return; }
    const esc = v => { const s = String(v||''); return s.includes(',') || s.includes('"') ? '"' + s.replace(/"/g,'""') + '"' : s; };
    const headers = ['Cliente','Telefono','Perfume','Monto','Abonado','Resta','Fecha Venta','Fecha Pago','Estado','Notas'];
    const filas = deudas.map(d => {
      const ab = (d.abonos||[]).reduce((s,a)=>s+a.monto,0);
      return [d.cliente,d.tel,d.perfume,d.monto.toFixed(2),ab.toFixed(2),(d.monto-ab).toFixed(2),d.fecha,d.fechaVence,getEstado(d),d.notas].map(esc).join(',');
    });
    const csv = '\uFEFF' + [headers.join(','), ...filas].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    a.download = `parfum-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  }

  function mostrarVista(v) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
  }

  // ── Init ───────────────────────────────────────────────────────────────
  renderLista();
  renderStats();
  cargarDeSheets();
</script>
</body>
</html>
