<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parfum · Gestor de Deudas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --gold: #b8975a;
    --gold-light: #d4b483;
    --dark: #1a1208;
    --brown: #3d2b0e;
    --rose: #c4847a;
    --sage: #7a9e7e;
    --ink: #2a2018;
    --paper: #ede8dc;
    --border: rgba(184,151,90,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(184,151,90,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(196,132,122,0.07) 0%, transparent 50%);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .sync-indicator {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--gold);
    opacity: 0.85;
  }

  .sync-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #b8975a;
    flex-shrink: 0;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(245,240,232,0.9);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--dark);
  }

  .logo-sub {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 40px;
  }

  .stat {
    text-align: right;
  }

  .stat-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--dark);
  }

  .stat-value.danger { color: var(--rose); }
  .stat-value.safe { color: var(--sage); }

  /* Main layout */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* Section titles */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    font-style: italic;
    color: var(--brown);
    letter-spacing: 0.05em;
  }

  /* Add form */
  .add-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
    margin-bottom: 48px;
    position: relative;
    overflow: hidden;
  }

  .add-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--gold), var(--gold-light));
  }

  .add-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--brown);
    margin-bottom: 24px;
    letter-spacing: 0.08em;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 120px;
    gap: 16px;
    align-items: end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .field input, .field select, .field textarea {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 1px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--gold);
  }

  .field input::placeholder { color: rgba(42,32,24,0.35); }

  .btn-add {
    background: var(--gold);
    color: var(--cream);
    border: none;
    padding: 10px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    height: 40px;
  }

  .btn-add:hover { background: var(--brown); }
  .btn-add:active { transform: scale(0.98); }

  /* Filters */
  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--brown);
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--gold);
    color: var(--cream);
    border-color: var(--gold);
  }

  .btn-csv {
    border-color: rgba(184,151,90,0.5);
    color: var(--gold);
    margin-left: auto;
  }

  .btn-csv:hover {
    background: var(--gold);
    color: var(--cream);
  }

  .search-input {
    margin-left: 0;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 1px;
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    outline: none;
    width: 200px;
  }

  .search-input:focus { border-color: var(--gold); }

  /* Table */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead {
    background: var(--brown);
    color: var(--cream);
  }

  thead th {
    padding: 14px 20px;
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-align: left;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: rgba(184,151,90,0.05); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 16px 20px;
    font-size: 12px;
    vertical-align: middle;
  }

  .client-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--dark);
  }

  .perfume-info {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }

  .amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--brown);
  }

  .amount.paid { color: var(--sage); }

  .date-cell {
    font-size: 11px;
    color: var(--ink);
    opacity: 0.7;
  }

  .date-vence {
    font-size: 10px;
    color: var(--rose);
    margin-top: 2px;
    font-weight: 400;
  }

  .date-vence.ok { color: var(--sage); }

  /* Status badge */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 1px;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .badge-pendiente { background: rgba(196,132,122,0.15); color: var(--rose); border: 1px solid rgba(196,132,122,0.3); }
  .badge-pagado { background: rgba(122,158,126,0.15); color: var(--sage); border: 1px solid rgba(122,158,126,0.3); }
  .badge-vencido { background: rgba(196,132,122,0.25); color: #c0392b; border: 1px solid rgba(192,57,43,0.3); }
  .badge-abonado { background: rgba(184,151,90,0.15); color: var(--gold); border: 1px solid rgba(184,151,90,0.3); }

  /* Actions */
  .actions {
    display: flex;
    gap: 8px;
  }

  .btn-action {
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.15s;
    color: var(--brown);
  }

  .btn-pay { border-color: rgba(122,158,126,0.4); color: var(--sage); }
  .btn-pay:hover { background: var(--sage); color: white; }

  .btn-del { border-color: rgba(196,132,122,0.4); color: var(--rose); }
  .btn-del:hover { background: var(--rose); color: white; }

  .btn-edit { border-color: rgba(184,151,90,0.4); color: var(--gold); }
  .btn-edit:hover { background: var(--gold); color: white; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: rgba(42,32,24,0.4);
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .empty-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
  }

  /* Abono modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 40px;
    width: 380px;
    position: relative;
  }

  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--dark);
    margin-bottom: 8px;
  }

  .modal-sub {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--brown);
    opacity: 0.5;
  }

  .modal-close:hover { opacity: 1; }

  .modal .field { margin-bottom: 16px; }

  .modal-btns {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn-confirm {
    flex: 1;
    background: var(--sage);
    color: white;
    border: none;
    padding: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    transition: background 0.2s;
  }

  .btn-confirm:hover { background: #5d7f61; }

  .btn-cancel {
    flex: 1;
    background: transparent;
    color: var(--brown);
    border: 1px solid var(--border);
    padding: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
  }

  /* Abonos history */
  .abonos-list {
    margin-top: 16px;
    max-height: 150px;
    overflow-y: auto;
  }

  .abono-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }

  .abono-item:last-child { border-bottom: none; }

  /* Responsive */
  @media (max-width: 768px) {
    header { padding: 16px 20px; flex-direction: column; gap: 16px; align-items: flex-start; }
    .header-stats { gap: 20px; }
    main { padding: 24px 16px; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .btn-add { grid-column: span 2; }
    table { font-size: 11px; }
    thead th, tbody td { padding: 10px 12px; }
    .client-name { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">Parfum</span>
    <span class="logo-sub">Gestor de Cuentas por Cobrar</span>
  </div>
  <div class="header-stats">
    <div class="sync-indicator">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-txt">Cargando...</span>
    </div>
    <div class="stat">
      <div class="stat-label">Total pendiente</div>
      <div class="stat-value danger" id="totalPendiente">$0.00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total cobrado</div>
      <div class="stat-value safe" id="totalCobrado">$0.00</div>
    </div>
    <div class="stat">
      <div class="stat-label">Clientes</div>
      <div class="stat-value" id="totalClientes">0</div>
    </div>
  </div>
</header>

<main>

  <!-- Add Form -->
  <div class="add-card">
    <h2>Registrar nueva deuda</h2>
    <div class="form-grid">
      <div class="field">
        <label>Cliente</label>
        <input type="text" id="inp-cliente" placeholder="Nombre completo">
      </div>
      <div class="field">
        <label>Perfume / Producto</label>
        <input type="text" id="inp-perfume" placeholder="Ej: Chanel No.5 100ml">
      </div>
      <div class="field">
        <label>Monto ($)</label>
        <input type="number" id="inp-monto" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Fecha venta</label>
        <input type="date" id="inp-fecha">
      </div>
      <div class="field">
        <label>Fecha de pago</label>
        <input type="date" id="inp-vence">
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input type="text" id="inp-tel" placeholder="Opcional">
      </div>
      <div class="field">
        <label>Notas</label>
        <input type="text" id="inp-notas" placeholder="Ej: Entregó anticipo $50">
      </div>
      <div class="field">
        <button class="btn-add" onclick="agregarDeuda()">+ Agregar</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="section-header">
    <span class="section-title">Registro de deudas</span>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFiltro('todos', this)">Todos</button>
    <button class="filter-btn" onclick="setFiltro('pendiente', this)">Pendientes</button>
    <button class="filter-btn" onclick="setFiltro('vencido', this)">Vencidos</button>
    <button class="filter-btn" onclick="setFiltro('abonado', this)">Abonados</button>
    <button class="filter-btn" onclick="setFiltro('pagado', this)">Pagados</button>
    <button class="filter-btn btn-csv" onclick="exportarCSV()" title="Descargar todos los registros como CSV">⬇ Exportar CSV</button>
    <input type="text" class="search-input" placeholder="Buscar cliente..." oninput="renderTabla()">
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Monto total</th>
          <th>Abonado</th>
          <th>Resta</th>
          <th>Fecha venta</th>
          <th>Fecha pago</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-body">
      </tbody>
    </table>
    <div class="empty-state" id="empty-state" style="display:none;">
      <div class="empty-icon">🌸</div>
      <div class="empty-text">No hay registros aún</div>
    </div>
  </div>

</main>

<!-- Modal abono -->
<div class="modal-overlay" id="modal-abono">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">×</button>
    <h3 id="modal-nombre">Cliente</h3>
    <div class="modal-sub" id="modal-perfume-info"></div>

    <div class="field">
      <label>Monto del abono ($)</label>
      <input type="number" id="modal-monto" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="field">
      <label>Fecha del abono</label>
      <input type="date" id="modal-fecha">
    </div>
    <div class="field">
      <label>Nota (opcional)</label>
      <input type="text" id="modal-nota" placeholder="Ej: Transferencia, efectivo...">
    </div>

    <div class="abonos-list" id="abonos-list"></div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirm" onclick="registrarAbono()">Registrar abono</button>
    </div>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzaLqQf44ncZHDcuyJzET9sIxMcMSx6KWYib_Dh8inF3nOz05a6_Wm7WPx6ToLNlQI/exec';

  // ── State ──────────────────────────────────────────────────────────────
  let deudas = JSON.parse(localStorage.getItem('parfum-deudas') || '[]');
  let filtroActual = 'todos';
  let modalId = null;
  let syncTimeout = null;

  // Set today as default dates
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('inp-fecha').value = today;
  document.getElementById('modal-fecha').value = today;

  // ── Sync status UI ─────────────────────────────────────────────────────
  function setSyncStatus(estado) {
    const dot = document.getElementById('sync-dot');
    const txt = document.getElementById('sync-txt');
    if (estado === 'syncing') {
      dot.style.background = '#b8975a';
      txt.textContent = 'Guardando...';
      dot.style.animation = 'pulse 1s infinite';
    } else if (estado === 'ok') {
      dot.style.background = '#7a9e7e';
      txt.textContent = 'Sincronizado ✓';
      dot.style.animation = 'none';
    } else if (estado === 'error') {
      dot.style.background = '#c4847a';
      txt.textContent = 'Error al guardar';
      dot.style.animation = 'none';
    } else if (estado === 'loading') {
      dot.style.background = '#b8975a';
      txt.textContent = 'Cargando datos...';
      dot.style.animation = 'pulse 1s infinite';
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function guardar() {
    localStorage.setItem('parfum-deudas', JSON.stringify(deudas));
    clearTimeout(syncTimeout);
    setSyncStatus('syncing');
    syncTimeout = setTimeout(guardarEnSheets, 800);
  }

  // ── JSONP helper — único método que funciona sin servidor ─────────────
  function jsonpRequest(params, onSuccess, onError) {
    const callbackName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timeout = setTimeout(() => {
      delete window[callbackName];
      const s = document.getElementById('_jsonp_' + callbackName);
      if (s) s.remove();
      if (onError) onError('timeout');
    }, 10000);

    window[callbackName] = function(data) {
      clearTimeout(timeout);
      delete window[callbackName];
      const s = document.getElementById('_jsonp_' + callbackName);
      if (s) s.remove();
      if (onSuccess) onSuccess(data);
    };

    const qs = Object.entries({ ...params, callback: callbackName, t: Date.now() })
      .map(([k, v]) => k + '=' + encodeURIComponent(v)).join('&');

    const script = document.createElement('script');
    script.id = '_jsonp_' + callbackName;
    script.src = SHEETS_URL + '?' + qs;
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[callbackName];
      if (onError) onError('script error');
    };
    document.head.appendChild(script);
  }

  // ── Guardar en Sheets via JSONP GET ────────────────────────────────────
  function guardarEnSheets() {
    try {
      // Usar iframe + form para POST (evita límite de URL y CORS)
      let iframe = document.getElementById('_sheets_iframe');
      if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = '_sheets_iframe';
        iframe.name = '_sheets_iframe';
        iframe.style.cssText = 'display:none;position:absolute;';
        document.body.appendChild(iframe);
      }

      let form = document.getElementById('_sheets_form');
      if (form) form.remove();
      form = document.createElement('form');
      form.id = '_sheets_form';
      form.method = 'POST';
      form.action = SHEETS_URL;
      form.target = '_sheets_iframe';
      form.style.cssText = 'display:none;position:absolute;';

      const inp = document.createElement('input');
      inp.type = 'hidden';
      inp.name = 'data';
      inp.value = JSON.stringify(deudas);
      form.appendChild(inp);

      const act = document.createElement('input');
      act.type = 'hidden';
      act.name = 'action';
      act.value = 'save';
      form.appendChild(act);

      document.body.appendChild(form);

      // Esperar respuesta del iframe
      iframe.onload = () => {
        setSyncStatus('ok');
        form.remove();
      };

      // Timeout fallback — si no responde en 8s igual marcamos ok
      // porque con no-cors el iframe.onload no siempre dispara
      setTimeout(() => setSyncStatus('ok'), 3000);

      form.submit();
    } catch (err) {
      console.error('Error guardando:', err);
      setSyncStatus('error');
    }
  }

  // ── Cargar de Sheets via JSONP GET ─────────────────────────────────────
  function cargarDeSheets() {
    setSyncStatus('loading');
    jsonpRequest(
      { action: 'load' },
      (data) => {
        try {
          if (Array.isArray(data) && data.length > 0) {
            deudas = data.map(d => ({
              ...d,
              monto: parseFloat(d.monto) || 0,
              abonos: typeof d.abonos === 'string'
                ? JSON.parse(d.abonos || '[]')
                : (d.abonos || [])
            }));
            localStorage.setItem('parfum-deudas', JSON.stringify(deudas));
          }
          setSyncStatus('ok');
        } catch(e) {
          setSyncStatus('error');
        }
        renderTabla();
        renderStats();
      },
      () => {
        console.warn('No se pudo cargar de Sheets, usando datos locales.');
        setSyncStatus('error');
        renderTabla();
        renderStats();
      }
    );
  }

  // ── Exportar CSV ───────────────────────────────────────────────────────
  function escaparCSV(val) {
    if (val === null || val === undefined) return '';
    const str = String(val);
    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
      return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
  }

  function exportarCSV() {
    if (deudas.length === 0) {
      alert('No hay registros para exportar.');
      return;
    }

    const headers = [
      'Cliente', 'Telefono', 'Perfume/Producto',
      'Monto Total', 'Total Abonado', 'Saldo Pendiente',
      'Fecha Venta', 'Fecha Pago Acordada', 'Estado', 'Notas',
      'Abonos (fecha|monto|nota)'
    ];

    const filas = deudas.map(d => {
      const abonado = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
      const resta = Math.max(0, d.monto - abonado);
      const estado = getEstado(d);
      const estadoLabel = { pendiente: 'Pendiente', pagado: 'Pagado', vencido: 'Vencido', abonado: 'Abonado' }[estado];
      const abonosStr = (d.abonos || []).map(a => `${a.fecha}|${a.monto}|${a.nota||''}`).join(' / ');

      return [
        d.cliente,
        d.tel || '',
        d.perfume || '',
        d.monto.toFixed(2),
        abonado.toFixed(2),
        resta.toFixed(2),
        d.fecha || '',
        d.fechaVence || '',
        estadoLabel,
        d.notas || '',
        abonosStr
      ].map(escaparCSV).join(',');
    });

    const csvContent = '\uFEFF' + [headers.join(','), ...filas].join('\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const fecha = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `parfum-deudas-${fecha}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function fmt(n) {
    return '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function fmtDate(d) {
    if (!d) return '—';
    const [y, m, dia] = d.split('-');
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${dia} ${meses[+m-1]} ${y}`;
  }

  function getEstado(d) {
    const abonado = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
    const resta = d.monto - abonado;

    if (resta <= 0) return 'pagado';

    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const vence = d.fechaVence ? new Date(d.fechaVence + 'T00:00:00') : null;

    if (vence && vence < hoy) return 'vencido';
    if (abonado > 0) return 'abonado';
    return 'pendiente';
  }

  function diasRestantes(fechaVence) {
    if (!fechaVence) return null;
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const v = new Date(fechaVence + 'T00:00:00');
    return Math.round((v - hoy) / 86400000);
  }

  // ── Agregar deuda ──────────────────────────────────────────────────────
  function agregarDeuda() {
    const cliente = document.getElementById('inp-cliente').value.trim();
    const perfume = document.getElementById('inp-perfume').value.trim();
    const monto = parseFloat(document.getElementById('inp-monto').value);
    const fecha = document.getElementById('inp-fecha').value;
    const vence = document.getElementById('inp-vence').value;
    const tel = document.getElementById('inp-tel').value.trim();
    const notas = document.getElementById('inp-notas').value.trim();

    if (!cliente || !monto || monto <= 0) {
      alert('Por favor ingresa el nombre del cliente y el monto.');
      return;
    }

    const nueva = {
      id: Date.now(),
      cliente, perfume, monto, fecha, fechaVence: vence, tel, notas,
      abonos: []
    };

    deudas.unshift(nueva);
    guardar();
    renderTabla();
    renderStats();

    // Reset form
    document.getElementById('inp-cliente').value = '';
    document.getElementById('inp-perfume').value = '';
    document.getElementById('inp-monto').value = '';
    document.getElementById('inp-vence').value = '';
    document.getElementById('inp-tel').value = '';
    document.getElementById('inp-notas').value = '';
    document.getElementById('inp-fecha').value = today;
  }

  // ── Eliminar ───────────────────────────────────────────────────────────
  function eliminar(id) {
    if (!confirm('¿Eliminar este registro?')) return;
    deudas = deudas.filter(d => d.id !== id);
    guardar();
    renderTabla();
    renderStats();
  }

  // ── Modal abono ────────────────────────────────────────────────────────
  function abrirAbono(id) {
    modalId = id;
    const d = deudas.find(x => x.id === id);
    document.getElementById('modal-nombre').textContent = d.cliente;
    document.getElementById('modal-perfume-info').textContent = d.perfume ? `${d.perfume} · ${fmt(d.monto)}` : fmt(d.monto);
    document.getElementById('modal-monto').value = '';
    document.getElementById('modal-nota').value = '';
    document.getElementById('modal-fecha').value = today;

    // Show abonos history
    const lista = document.getElementById('abonos-list');
    if (d.abonos && d.abonos.length > 0) {
      lista.innerHTML = '<div style="font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;">Historial de abonos</div>' +
        d.abonos.map(a => `<div class="abono-item"><span>${fmtDate(a.fecha)} ${a.nota ? '· '+a.nota : ''}</span><span style="color:var(--sage)">${fmt(a.monto)}</span></div>`).join('');
    } else {
      lista.innerHTML = '';
    }

    document.getElementById('modal-abono').classList.add('open');
  }

  function cerrarModal() {
    document.getElementById('modal-abono').classList.remove('open');
    modalId = null;
  }

  function registrarAbono() {
    const monto = parseFloat(document.getElementById('modal-monto').value);
    const fecha = document.getElementById('modal-fecha').value;
    const nota = document.getElementById('modal-nota').value.trim();

    if (!monto || monto <= 0) { alert('Ingresa un monto válido.'); return; }

    const d = deudas.find(x => x.id === modalId);
    const abonado = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
    const resta = d.monto - abonado;

    if (monto > resta + 0.001) {
      alert(`El monto supera la deuda restante (${fmt(resta)})`);
      return;
    }

    d.abonos.push({ monto, fecha, nota });
    guardar();
    cerrarModal();
    renderTabla();
    renderStats();
  }

  // ── Filtro y búsqueda ──────────────────────────────────────────────────
  function setFiltro(f, btn) {
    filtroActual = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTabla();
  }

  // ── Render stats ───────────────────────────────────────────────────────
  function renderStats() {
    let pendiente = 0, cobrado = 0, clientes = new Set();
    deudas.forEach(d => {
      const abonado = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
      pendiente += Math.max(0, d.monto - abonado);
      cobrado += abonado;
      clientes.add(d.cliente);
    });
    document.getElementById('totalPendiente').textContent = fmt(pendiente);
    document.getElementById('totalCobrado').textContent = fmt(cobrado);
    document.getElementById('totalClientes').textContent = clientes.size;
  }

  // ── Render tabla ───────────────────────────────────────────────────────
  function renderTabla() {
    const busqueda = document.querySelector('.search-input').value.toLowerCase();

    let lista = deudas.filter(d => {
      const estado = getEstado(d);
      const matchFiltro = filtroActual === 'todos' || estado === filtroActual;
      const matchBusq = !busqueda || d.cliente.toLowerCase().includes(busqueda) || (d.perfume||'').toLowerCase().includes(busqueda);
      return matchFiltro && matchBusq;
    });

    const tbody = document.getElementById('tabla-body');
    const empty = document.getElementById('empty-state');

    if (lista.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = lista.map(d => {
      const abonado = (d.abonos || []).reduce((s, a) => s + a.monto, 0);
      const resta = d.monto - abonado;
      const estado = getEstado(d);
      const dias = diasRestantes(d.fechaVence);

      let badgeClass = `badge-${estado}`;
      let badgeLabel = { pendiente: 'Pendiente', pagado: 'Pagado', vencido: 'Vencido', abonado: 'Abonado' }[estado];

      let diasInfo = '';
      if (estado !== 'pagado' && d.fechaVence) {
        if (dias < 0) diasInfo = `<div class="date-vence">Venció hace ${Math.abs(dias)}d</div>`;
        else if (dias === 0) diasInfo = `<div class="date-vence">Vence hoy</div>`;
        else if (dias <= 7) diasInfo = `<div class="date-vence">Vence en ${dias}d</div>`;
        else diasInfo = `<div class="date-vence ok">Vence en ${dias}d</div>`;
      }

      return `<tr>
        <td>
          <div class="client-name">${d.cliente}</div>
          ${d.perfume ? `<div class="perfume-info">🌸 ${d.perfume}</div>` : ''}
          ${d.tel ? `<div class="perfume-info">📱 ${d.tel}</div>` : ''}
          ${d.notas ? `<div class="perfume-info" style="color:var(--brown);opacity:.7">📝 ${d.notas}</div>` : ''}
        </td>
        <td><span class="amount">${fmt(d.monto)}</span></td>
        <td><span class="amount paid">${abonado > 0 ? fmt(abonado) : '—'}</span></td>
        <td><span class="amount ${estado === 'pagado' ? 'paid' : ''}">${estado === 'pagado' ? '✓' : fmt(resta)}</span></td>
        <td><div class="date-cell">${fmtDate(d.fecha)}</div></td>
        <td>
          <div class="date-cell">${fmtDate(d.fechaVence)}</div>
          ${diasInfo}
        </td>
        <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
        <td>
          <div class="actions">
            ${estado !== 'pagado' ? `<button class="btn-action btn-pay" onclick="abrirAbono(${d.id})">Abonar</button>` : ''}
            <button class="btn-action btn-del" onclick="eliminar(${d.id})">Borrar</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  // ── Init ───────────────────────────────────────────────────────────────
  renderTabla();
  renderStats();
  cargarDeSheets(); // load fresh data from Sheets on every page open

  // Close modal on overlay click
  document.getElementById('modal-abono').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });
</script>
</body>
